name: Continuous Integration - Other

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
#        - {
#            name: "macOS",
#            os: macos-latest
#          }
        - {
            name: "Linux",
            os: ubuntu-latest
          }

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        set -o pipefail
        sudo apt-get update -qq
        # Build Mono from source – the mono-project.com apt repo is
        # not available on every runner, so we compile from a GitHub fork that tracks upstream.
        sudo apt-get install -y --no-install-recommends \
          build-essential autoconf automake libtool cmake \
          libglib2.0-dev zlib1g-dev libssl-dev pkg-config gettext \
          g++ libx11-dev libxfixes-dev mesa-common-dev xvfb
        # Clone Mono fork (EdgeOfAssembly/mono) tracking 6.13.x / tip of mono/mono main
        git clone --depth=1 --recurse-submodules --shallow-submodules \
          https://github.com/EdgeOfAssembly/mono.git /tmp/mono-src
        cd /tmp/mono-src
        ./autogen.sh --prefix=/usr/local --with-mcs-docs=no --disable-nls \
          --with-profile4_x=yes
        make -j$(nproc)
        sudo make install
        mono --version
        msbuild /version 2>/dev/null || xbuild /version 2>/dev/null

    - name: Build
      run: |
        if [[ "${{ runner.os }}" == 'macOS' ]]; then
          make mac
        elif [[ "${{ runner.os }}" == 'Linux' ]]; then
          make linux
        fi

    - name: Test Files Presence
      run: |
        FILES=( \
          Build/Builder.exe \
          Build/libBuilderNative.so \
          Build/Plugins/AutomapMode.dll \
          Build/Plugins/BuilderEffects.dll \
          Build/Plugins/BuilderModes.dll \
          Build/Plugins/ColorPicker.dll \
          Build/Plugins/CommentsPanel.dll \
          Build/Plugins/NodesViewer.dll \
          Build/Plugins/SoundPropagationMode.dll \
          Build/Plugins/StairSectorBuilder.dll \
          Build/Plugins/TagExplorer.dll \
          Build/Plugins/TagRange.dll \
          Build/Plugins/ThreeDFloorMode.dll \
          Build/Plugins/VisplaneExplorer.dll \
        )
        for filename in "${FILES[@]}"; do
          if [ ! -f $filename ]; then
           echo "ERROR: File $filename is missing"
           exit 1
          fi
        done

